<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0;url=https://telc-pro.netlify.app">
<title>تم تغيير رابط الموقع 🤩</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f0e8;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: white;
    border: 1px solid #ddd8cc;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.07);
  }
  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #c8602a;
    color: white;
    font-weight: 900;
    font-size: 0.95rem;
    width: 44px;
    height: 44px;
    border-radius: 8px;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.9rem;
    color: #7a7468;
    margin-bottom: 1.75rem;
    line-height: 1.6;
  }
  a.new-link {
    display: inline-block;
    background: #c8602a;
    color: white;
    text-decoration: none;
    padding: 0.85rem 2rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: background 0.2s;
    word-break: break-all;
  }
  a.new-link:hover { background: #b35424; }
  .note {
    margin-top: 1.25rem;
    font-size: 0.78rem;
    color: #aaa;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">B2</div>
  <h1>تم تغيير رابط الموقع 🤩</h1>
  <p>سوف يتم تحويلك للرابط الجديد الآن 🤩</p>
  <a class="new-link" href="https://telc-pro.netlify.app">
    🔗 telc-pro.netlify.app
  </a>
  
</div>
</body>
</html>
